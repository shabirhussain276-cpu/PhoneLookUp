<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Phone Number Lookup</title>
</head>
<body>
    <h1>Phone Number Details Lookup</h1>
    <input type="text" id="phoneNumber" placeholder="Enter phone number" />
    <button onclick="lookupNumber()">Lookup</button>
    <div id="result"></div>

    <script>
        async function lookupNumber() {
            const apiKey = 'YOUR_API_KEY'; // Replace with your NumVerify API key
            const phone = document.getElementById('phoneNumber').value.trim();
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Loading...';

            if (!phone) {
                resultDiv.innerHTML = 'Please enter a phone number.';
                return;
            }

            try {
                const response = await fetch(https://apilayer.net/api/validate?access_key=${apiKey}&number=${encodeURIComponent(phone)});
                const data = await response.json();

                if (data.valid) {
                    resultDiv.innerHTML = `
                        <p><strong>International Format:</strong> ${data.international_format}</p>
                        <p><strong>Country:</strong> ${data.country_name}</p>
                        <p><strong>Location (City):</strong> ${data.location || 'N/A'}</p>
                        <p><strong>Carrier:</strong> ${data.carrier || 'N/A'}</p>
                        <p><strong>Line type:</strong> ${data.line_type}</p>
                    `;
                } else {
                    resultDiv.innerHTML = 'Invalid phone number.';
                }
            } catch (error) {
                resultDiv.innerHTML = 'Error fetching data.';
                console.error(error);
            }
        }
    </script>
</body>
</html>
