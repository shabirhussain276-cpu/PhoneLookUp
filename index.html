<!DOCTYPE html>
<html>
<head>
  <title>Country Info Lookup</title>
</head>
<body>
  <h1>Country Information Lookup</h1>
  <label for="countryCode">Enter Country Code (e.g., US, IN, FR): </label>
  <input type="text" id="countryCode" placeholder="Country Code" />
  <button onclick="lookupCountry()">Get Info</button>

  <div id="result" style="margin-top:20px;"></div>

  <script>
    // Sample country data
    const countryData = {
      "US": {
        name: "United States",
        capital: "Washington, D.C.",
        population: 331000000,
        callingCode: "+1"
      },
      "IN": {
        name: "India",
        capital: "New Delhi",
        population: 1380004385,
        callingCode: "+91"
      },
      "FR": {
        name: "France",
        capital: "Paris",
        population: 67000000,
        callingCode: "+33"
      },
      // Add more countries as needed
    };

    function lookupCountry() {
      const code = document.getElementById('countryCode').value.trim().toUpperCase();
      const resultDiv = document.getElementById('result');

      if (countryData[code]) {
        const country = countryData[code];
        resultDiv.innerHTML = `
          <h2>${country.name}</h2>
          <p><strong>Capital:</strong> ${country.capital}</p>
          <p><strong>Population:</strong> ${country.population.toLocaleString()}</p>
          <p><strong>Calling Code:</strong> ${country.callingCode}</p>
        `;
      } else {
        resultDiv.innerHTML = `<p>Country code not found.</p>`;
      }
    }
  </script>
</body>
</html>
