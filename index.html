<!DOCTYPE html>
<html>
<head>
  <title>Phone Number with Country Code</title>
</head>
<body>
  <h1>Enter Your Phone Number</h1>

  <label for="countrySelect">Select Country: </label>
  <select id="countrySelect" onchange="updateCountryCode()">
    <option value="">--Select Country--</option>
    <option value="US">United States</option>
    <option value="IN">India</option>
    <option value="FR">France</option>
    <option value="PK">Pakistan</option>
    <option value="GR">Greece</option>
  </select>

  <br/><br/>

  <label for="phoneNumber">Phone Number: </label>
  <input type="tel" id="phoneNumber" placeholder="Enter phone number" />

  <script>
    const countries = {
      "US": { name: "United States", code: "+1" },
      "IN": { name: "India", code: "+91" },
      "FR": { name: "France", code: "+33" },
      "PK": { name: "Pakistan", code: "+92" },
      "GR": { name: "Greece", code: "+30" }
    };

    function updateCountryCode() {
      const select = document.getElementById('countrySelect');
      const phoneInput = document.getElementById('phoneNumber');
      const selectedCode = select.value;

      if (countries[selectedCode]) {
        const countryCode = countries[selectedCode].code;
        // Remove any existing country code prefix
        let currentNumber = phoneInput.value.replace(/^\+\d+\s?/, '');
        // Set the new country code prefix
        phoneInput.value = countryCode + ' ' + currentNumber;
      } else {
        // If no country selected, do not add code
        // Optionally, clear prefix if desired
        // phoneInput.value = '';
      }
    }

    // Optional: When user edits the number, keep the country code prefix intact
    document.getElementById('phoneNumber').addEventListener('input', function() {
      const select = document.getElementById('countrySelect');
      const selectedCode = select.value;
      if (countries[selectedCode]) {
        const countryCode = countries[selectedCode].code;
        let currentNumber = this.value;
        // If user deletes the prefix, re-add it
        if (!currentNumber.startsWith(countryCode)) {
          // Remove existing prefix if any
          currentNumber = currentNumber.replace(/^\+\d+\s?/, '');
          this.value = countryCode + ' ' + currentNumber;
        }
      }
    });
  </script>
</body>
</html>
