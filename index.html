<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Location Lookup & Phone Number Input</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }
  label {
    display: block;
    margin-top: 10px;
  }
  input, select, button {
    padding: 8px;
    width: 300px;
    max-width: 100%;
    margin-top: 5px;
  }
  #result {
    margin-top: 20px;
  }
</style>
</head>
<body>

<h2>Location Lookup & Phone Number Entry</h2>

<!-- Location Lookup Section -->
<h3>Lookup Holder Location</h3>
<label for="locationName">Holder Name:</label>
<input type="text" id="locationName" placeholder="Enter holder name" />

<button onclick="lookupLocation()">Lookup Location</button>

<div id="locationResult"></div>

<!-- Phone Number Entry Section -->
<h3>Add Phone Number</h3>
<label for="phoneNumber">Number:</label>
<input type="tel" id="phoneNumber" placeholder="Enter phone number" />

<label for="countrySelect">Country:</label>
<select id="countrySelect">
  <option value="">Select Country</option>
  <option value="US" data-code="+1">United States</option>
  <option value="IN" data-code="+91">India</option>
  <option value="GB" data-code="+44">United Kingdom</option>
  <option value="CA" data-code="+1">Canada</option>
  <option value="AU" data-code="+61">Australia</option>
  <!-- Add more countries as needed -->
</select>

<label for="countryCode">Country Code:</label>
<input type="text" id="countryCode" readonly />

<button onclick="addPhoneNumber()">Add Phone Number</button>

<div id="phoneNumberDisplay"></div>

<script>
  // Sample data for location lookup
  const locationData = {
    "John Doe": { city: "New York", country: "United States" },
    "Jane Smith": { city: "London", country: "United Kingdom" },
    "Rahul Kumar": { city: "Mumbai", country: "India" }
  };

  function lookupLocation() {
    const name = document.getElementById('locationName').value.trim();
    const resultDiv = document.getElementById('locationResult');

    if (name in locationData) {
      const data = locationData[name];
      resultDiv.innerHTML = `<strong>City:</strong> ${data.city}<br><strong>Country:</strong> ${data.country}`;
    } else {
      resultDiv.innerHTML = "Location data not found.";
    }
  }

  // Update country code based on selected country
  document.getElementById('countrySelect').addEventListener('change', function() {
    const selectedOption = this.options[this.selectedIndex];
    const code = selectedOption.getAttribute('data-code') || '';
    document.getElementById('countryCode').value = code;
  });

  function addPhoneNumber() {
    const number = document.getElementById('phoneNumber').value.trim();
    const country = document.getElementById('countrySelect').value;
    const code = document.getElementById('countryCode').value;

    if (!number || !country || !code) {
      alert('Please enter all fields.');
      return;
    }

    const displayDiv = document.getElementById('phoneNumberDisplay');
    const formattedNumber = `${code} ${number}`;
    displayDiv.innerHTML += `<p>${formattedNumber} (${country})</p>`;
  }
</script>

</body>
</html>
